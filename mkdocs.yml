site_name: drone-reel Documentation
site_description: AI-powered CLI tool to create Instagram-style reels from drone footage
site_url: https://m-deane.github.io/claude-template

repo_name: drone-reel
repo_url: https://github.com/m-deane/claude-template

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - CLI Reference: cli-reference.md
  - Python API: api-reference.md
  - Generated API Reference:
    - Overview: api/index.md
    - Core Pipeline:
      - SceneDetector: api/scene_detector.md
      - SceneFilter: api/scene_filter.md
      - SceneSequencer: api/scene_sequencer.md
      - DiversitySelector: api/sequence_optimizer.md
      - DurationAdjuster: api/duration_adjuster.md
      - BeatSync: api/beat_sync.md
      - VideoProcessor: api/video_processor.md
      - Stabilizer: api/stabilizer.md
      - Reframer: api/reframer.md
      - ColorGrader: api/color_grader.md
    - Enhancements:
      - SpeedRamper: api/speed_ramper.md
      - TextOverlay: api/text_overlay.md
      - Narrative: api/narrative.md
      - Preview: api/preview.md
      - ExportPresets: api/export_presets.md
    - Analysis:
      - SceneAnalyzer: api/scene_analyzer.md
      - ReframeSelector: api/reframe_selector.md
    - Utilities:
      - File Utils: api/file_utils.md
      - Config: api/config.md
      - Resource Guard: api/resource_guard.md
  - Presets:
    - Color Presets: presets/color-presets.md
    - Transitions: presets/transitions.md
  - Advanced Color Grader: color_grader_advanced_features.md
  - Examples: examples/README.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/m-deane/claude-template
